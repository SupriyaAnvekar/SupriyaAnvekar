<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Solaris Pro | Interactive Galaxy</title>  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;400;600&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">  <style>  
:root {  
    --accent: #ffcc00;  
    --glass: rgba(255, 255, 255, 0.05);  
    --border: rgba(255, 255, 255, 0.12);  
    --bg-dark: #020204;  
}  
  
body, html {   
    margin: 0; padding: 0; overflow: hidden;   
    background: var(--bg-dark);   
    font-family: 'Montserrat', sans-serif; color: white;   
}  
  
canvas { display: block; }  
  
#ui-layer {  
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;  
    pointer-events: none; z-index: 10;  
    display: flex; flex-direction: column; justify-content: space-between;  
    padding: 25px; box-sizing: border-box;  
}  
  
header { pointer-events: auto; }  
.logo {   
    font-family: 'Syncopate', sans-serif;   
    font-size: 20px; font-weight: 700; letter-spacing: 5px;   
    text-transform: uppercase;  
}  
.logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent); }  
  
/* --- INFO PANEL BASE --- */  
.info-panel {  
    width: 320px;   
    border: 1px solid var(--border);  
    border-radius: 20px; padding: 25px; pointer-events: auto;  
    backdrop-filter: blur(30px);  
    opacity: 0; transform: translateX(-30px);  
    transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);  
    box-shadow: 0 15px 35px rgba(0,0,0,0.7);  
}  
  
.info-panel.visible { opacity: 1; transform: translateX(0); }  
  
/* --- DARK PLANET THEMES --- */  
.info-panel.Sun { background: rgba(40, 30, 0, 0.9); border-color: rgba(255, 204, 0, 0.4); box-shadow: 0 0 30px rgba(255, 204, 0, 0.1); }  
.info-panel.Mercury { background: rgba(20, 20, 20, 0.9); border-color: rgba(165, 165, 165, 0.4); }  
.info-panel.Venus { background: rgba(35, 25, 15, 0.9); border-color: rgba(227, 187, 118, 0.4); }  
.info-panel.Earth { background: rgba(5, 10, 35, 0.9); border-color: rgba(34, 51, 255, 0.4); box-shadow: 0 0 30px rgba(34, 51, 255, 0.1); }  
.info-panel.Mars { background: rgba(40, 10, 5, 0.9); border-color: rgba(255, 68, 34, 0.4); box-shadow: 0 0 30px rgba(255, 68, 34, 0.1); }  
.info-panel.Jupiter { background: rgba(30, 20, 10, 0.9); border-color: rgba(212, 163, 115, 0.4); }  
.info-panel.Saturn { background: rgba(35, 30, 10, 0.9); border-color: rgba(233, 196, 106, 0.4); box-shadow: 0 0 30px rgba(233, 196, 106, 0.1); }  
.info-panel.Uranus { background: rgba(10, 30, 40, 0.9); border-color: rgba(175, 219, 245, 0.4); }  
.info-panel.Neptune { background: rgba(5, 10, 45, 0.9); border-color: rgba(63, 94, 251, 0.4); box-shadow: 0 0 30px rgba(63, 94, 251, 0.1); }  
  
.info-panel h1 {   
    font-family: 'Orbitron', sans-serif; margin: 0 0 10px 0;   
    font-size: 32px; color: var(--accent); letter-spacing: 2px;  
}  
  
.info-panel p { font-size: 13px; opacity: 0.9; line-height: 1.6; font-weight: 300; }  
  
.stats-grid {  
    display: grid; grid-template-columns: 1fr 1fr; gap: 15px;  
    margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;  
}  
  
.stat-box span {   
    display: block; font-size: 9px; color: var(--accent);   
    text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;  
}  
.stat-box div { font-weight: 600; font-size: 14px; margin-top: 4px; font-family: 'Orbitron'; }  
  
/* --- NAVIGATION BAR --- */  
nav {  
    display: flex; gap: 8px; pointer-events: auto;  
    background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);  
    padding: 8px 15px; border-radius: 50px; border: 1px solid var(--border);  
    align-self: center; margin-bottom: 15px;  
    max-width: 95%; overflow-x: auto;  
}  
  
nav::-webkit-scrollbar { display: none; }  
  
nav button {  
    background: transparent; border: none; color: #888;  
    padding: 10px 18px; border-radius: 25px; cursor: pointer;  
    font-family: 'Syncopate', sans-serif; font-size: 9px;   
    font-weight: 700; transition: 0.4s; white-space: nowrap;  
}  
  
nav button:hover { color: white; background: rgba(255,255,255,0.05); }  
.active-btn { background: var(--accent) !important; color: black !important; }  
</style>  </head>  <body>  <div id="ui-layer">  
    <header><div class="logo">SOLARIS<span>.PRO</span></div></header>  <aside class="info-panel" id="panel">  
    <h1 id="p-name">Planets</h1>  
    <p id="p-desc">Select a planet to explore the wonders of our solar system.</p>  
    <div class="stats-grid">  
        <div class="stat-box"><span>Gravity</span><div id="p-grav">-</div></div>  
        <div class="stat-box"><span>Temp</span><div id="p-temp">-</div></div>  
        <div class="stat-box"><span>Diameter</span><div id="p-diam">-</div></div>  
        <div class="stat-box"><span>Day Length</span><div id="p-day">-</div></div>  
    </div>  
</aside>  

<nav id="navbar">  
    <button onclick="focusPlanet('Sun',this)">SUN</button>  
    <button onclick="focusPlanet('Mercury',this)">MERCURY</button>  
    <button onclick="focusPlanet('Venus',this)">VENUS</button>  
    <button onclick="focusPlanet('Earth',this)">EARTH</button>  
    <button onclick="focusPlanet('Mars',this)">MARS</button>  
    <button onclick="focusPlanet('Jupiter',this)">JUPITER</button>  
    <button onclick="focusPlanet('Saturn',this)">SATURN</button>  
    <button onclick="focusPlanet('Uranus',this)">URANUS</button>  
    <button onclick="focusPlanet('Neptune',this)">NEPTUNE</button>  
</nav>

</div>  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>  <script>  
const planetData = {  
    Sun: { desc: "The star at the center of the Solar System, providing energy for life.", grav: "274 m/s²", temp: "5,505°C", diam: "1.39M km", day: "25 Days", color: 0xffcc00, size: 10, dist: 0 },  
    Mercury: { desc: "The smallest planet in the Solar System, and the closest to the Sun.", grav: "3.7 m/s²", temp: "167°C", diam: "4,879 km", day: "58.6 Days", color: 0xa5a5a5, size: 2, dist: 30 },  
    Venus: { desc: "The hottest planet in the Solar System due to a dense atmosphere.", grav: "8.87 m/s²", temp: "464°C", diam: "12,104 km", day: "243 Days", color: 0xe3bb76, size: 3, dist: 50 },  
    Earth: { desc: "Our home planet, the only known world with life and liquid water.", grav: "9.8 m/s²", temp: "15°C", diam: "12,742 km", day: "24 Hours", color: 0x2233ff, size: 3.2, dist: 70 },  
    Mars: { desc: "Known as the Red Planet, home to the largest volcano in the galaxy.", grav: "3.71 m/s²", temp: "-63°C", diam: "6,779 km", day: "24.6 Hours", color: 0xff4422, size: 2.5, dist: 90 },  
    Jupiter: { desc: "The largest planet in the Solar System, with a massive magnetic field.", grav: "24.79 m/s²", temp: "-108°C", diam: "139,820 km", day: "9.9 Hours", color: 0xd4a373, size: 6.5, dist: 125 },  
    Saturn: { desc: "Famous for its spectacular ring system made of ice and rock.", grav: "10.44 m/s²", temp: "-138°C", diam: "116,460 km", day: "10.7 Hours", color: 0xe9c46a, size: 5.5, dist: 165 },  
    Uranus: { desc: "An ice giant that rotates on its side, nearly 90 degrees.", grav: "8.69 m/s²", temp: "-195°C", diam: "50,724 km", day: "17.2 Hours", color: 0xafdbf5, size: 4.5, dist: 200 },  
    Neptune: { desc: "The most distant planet from the Sun, dark, cold and stormy.", grav: "11.15 m/s²", temp: "-201°C", diam: "49,244 km", day: "16.1 Hours", color: 0x3f5efb, size: 4.5, dist: 235 }  
};  
  
const scene = new THREE.Scene();  
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 4000);  
  
camera.position.set(0, 100, 300);  
  
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });  
renderer.setSize(window.innerWidth, window.innerHeight);  
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));  
document.body.appendChild(renderer.domElement);  
  
scene.add(new THREE.AmbientLight(0xffffff, 0.7));  
const sunLight = new THREE.PointLight(0xffffff, 2, 1200);  
scene.add(sunLight);  
  
// Stars background  
const starGeo = new THREE.BufferGeometry();  
const starPos = new Float32Array(12000 * 3);  
for(let i=0; i<12000*3; i++) starPos[i] = (Math.random()-0.5) * 3000;  
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));  
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.9})));  
  
const meshes = {};  
Object.keys(planetData).forEach(name => {  
    const data = planetData[name];  
    const group = new THREE.Group();  
    group.position.x = data.dist;  
      
    const mesh = new THREE.Mesh(  
        new THREE.SphereGeometry(data.size, 64, 64),  
        new THREE.MeshStandardMaterial({  
            color: data.color,  
            emissive: data.color,  
            emissiveIntensity: name === "Sun" ? 1.5 : 0.25,  
        })  
    );  
    group.add(mesh);  
      
    if(name === "Saturn") {  
        const ringGeo = new THREE.RingGeometry(data.size * 1.4, data.size * 2.4, 64);  
        const ringMat = new THREE.MeshStandardMaterial({  
            color: 0xc5ab6e,  
            side: THREE.DoubleSide,  
            transparent: true,  
            opacity: 0.7  
        });  
        const ringMesh = new THREE.Mesh(ringGeo, ringMat);  
        ringMesh.rotation.x = Math.PI / 2.2;  
        group.add(ringMesh);  
    }  
      
    meshes[name] = group;  
    scene.add(group);  
      
    if(name !== "Sun") {  
        const orbit = new THREE.Mesh(  
            new THREE.RingGeometry(data.dist - 0.3, data.dist + 0.3, 128),  
            new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.08 })  
        );  
        orbit.rotation.x = Math.PI/2;  
        scene.add(orbit);  
    }  
});  
  
const raycaster = new THREE.Raycaster();  
const mouse = new THREE.Vector2();  
  
function handleInteractions(e) {  
    const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);  
    const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);  
    mouse.x = (x / window.innerWidth) * 2 - 1;  
    mouse.y = -(y / window.innerHeight) * 2 + 1;  
    raycaster.setFromCamera(mouse, camera);  
      
    const planetMeshes = Object.values(meshes).map(g => g.children[0]);  
    const intersects = raycaster.intersectObjects(planetMeshes);  
      
    if (intersects.length > 0) {  
        const targetMesh = intersects[0].object;  
        const name = Object.keys(meshes).find(key => meshes[key].children[0] === targetMesh);  
        focusPlanet(name, document.querySelector(`button[onclick*="'${name}'"]`));  
    }  
}  
  
window.addEventListener('click', handleInteractions);  
window.addEventListener('touchstart', handleInteractions);  
  
function focusPlanet(name, btn) {  
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));  
    if(btn) btn.classList.add('active-btn');  
  
    const panel = document.getElementById('panel');  
    const data = planetData[name];  
  
    // Update Box Style and Info  
    panel.className = 'info-panel visible ' + name;  
    document.getElementById('p-name').innerText = name;  
    document.getElementById('p-desc').innerText = data.desc;  
    document.getElementById('p-grav').innerText = data.grav;  
    document.getElementById('p-temp').innerText = data.temp;  
    document.getElementById('p-diam').innerText = data.diam;  
    document.getElementById('p-day').innerText = data.day;  
  
    // Smooth Camera Transition  
    const targetGroup = meshes[name];  
    const targetPos = targetGroup.position;  
      
    gsap.to(camera.position, {  
        x: targetPos.x,  
        y: data.size + 15,  
        z: targetPos.z + (data.size * 4) + 25,  
        duration: 2,  
        ease: "power2.out",  
        onUpdate: () => camera.lookAt(targetPos.x, 0, targetPos.z)  
    });  
}  
  
function animate() {  
    requestAnimationFrame(animate);  
    Object.values(meshes).forEach(g => {  
        g.children[0].rotation.y += 0.006;   
    });  
    renderer.render(scene, camera);  
}  
animate();  
  
window.addEventListener('resize', () => {  
    camera.aspect = window.innerWidth / window.innerHeight;  
    camera.updateProjectionMatrix();  
    renderer.setSize(window.innerWidth, window.innerHeight);  
});  
</script>  </body>  
</html>
